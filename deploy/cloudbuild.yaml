steps:
  # Pull the latest image for layer caching
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker pull gcr.io/$PROJECT_ID/blt-typesense:latest || exit 0'

  # Build the container image with cache from previous build
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/blt-typesense:latest'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/blt-typesense:latest'
      - '.'

  # Push the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/blt-typesense:latest']

  # Deploy to Cloud Run.
  # Typesense uses local /data; GCS is backup-only via entrypoint snapshot tar.
  # gen1 + 512Mi is enough for a small index; min-instances=1 + no-cpu-throttling
  # keep Raft healthy when idle. max-instances=1: single-node only.
  # Prerequisite: remove any GCS FUSE volume from the service once (see README).
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud run deploy blt-typesense \
          --project="$PROJECT_ID" \
          --image "gcr.io/$PROJECT_ID/blt-typesense:latest" \
          --region europe-west2 \
          --platform managed \
          --port 8108 \
          --allow-unauthenticated \
          --execution-environment=gen1 \
          --cpu=1 \
          --memory=512Mi \
          --no-cpu-throttling \
          --min-instances=1 \
          --max-instances=1 \
          --concurrency=80 \
          --timeout=300 \
          --set-secrets "TYPESENSE_API_KEY=$_TYPESENSE_API_KEY_SECRET:latest,TYPESENSE_SEARCH_API_KEY=$_TYPESENSE_SEARCH_API_KEY_SECRET:latest" \
          --set-env-vars "^@^TYPESENSE_ENABLE_CORS=true@TYPESENSE_CORS_DOMAINS=https://blt3.bltdirect.com,https://www.bltdirect.com,http://localhost:3000@TYPESENSE_BACKUP_URI=gs://blt-typesense-data@TYPESENSE_DATA_DIR=/data@TYPESENSE_BACKUP_INTERVAL_SECONDS=300" \
          --ingress=internal-and-cloud-load-balancing

images:
  - 'gcr.io/$PROJECT_ID/blt-typesense:latest'

substitutions:
  _TYPESENSE_API_KEY_SECRET: blt-typesense-api-key
  _TYPESENSE_SEARCH_API_KEY_SECRET: blt-typesense-search-api-key

options:
  logging: CLOUD_LOGGING_ONLY
